<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PagarNet - Situs Diblokir</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0c0c0f;
      --surface: #141418;
      --surface2:#1c1c22;
      --line:    #2a2a35;
      --accent:  #4f6ef7;
      --text:    #f0f0f5;
      --sub:     #7070a0;
      --dim:     #3a3a50;
      --danger:  #e05252;
      --warn:    #e8a44a;
      --safe:    #3ecf8e;
      --purple:  #8b5cf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    svg { display: block; flex-shrink: 0; }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }

    /* Top stripe */
    .stripe {
      height: 4px;
      background: var(--danger);
      width: 100%;
    }
    .stripe.judol { background: var(--purple); }

    /* Header area */
    .card-header {
      padding: 32px 32px 24px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .icon-wrap {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: rgba(224,82,82,0.1);
      border: 1px solid rgba(224,82,82,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }

    .icon-wrap.judol {
      background: rgba(139,92,246,0.1);
      border-color: rgba(139,92,246,0.2);
    }

    .category-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 16px;
      background: rgba(224,82,82,0.08);
      color: var(--danger);
      border: 1px solid rgba(224,82,82,0.15);
    }

    .category-tag.judol {
      background: rgba(139,92,246,0.08);
      color: var(--purple);
      border-color: rgba(139,92,246,0.15);
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
    }

    /* Info section */
    .card-info {
      padding: 20px 32px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .info-content { flex: 1; }

    .info-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 3px;
    }

    .info-val {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      word-break: break-all;
      font-family: 'DM Mono', monospace;
    }

    .info-val.plain {
      font-family: 'DM Sans', sans-serif;
    }

    /* Score bar */
    .score-section {
      padding: 0 32px 20px;
      border-bottom: 1px solid var(--line);
    }

    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .score-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--sub);
    }

    .score-val {
      font-size: 22px;
      font-weight: 700;
      color: var(--danger);
      letter-spacing: -0.5px;
    }

    .score-val.judol { color: var(--purple); }

    .track {
      height: 4px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }

    .track-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--danger);
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
      width: 0;
    }

    .track-fill.judol { background: var(--purple); }

    /* Buttons */
    .card-actions {
      padding: 20px 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-back {
      background: var(--text);
      color: var(--bg);
    }
    .btn-back:hover { opacity: 0.88; }

    .btn-report {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .btn-report:hover { background: var(--surface2); border-color: var(--sub); }

    .btn-proceed {
      background: transparent;
      color: var(--dim);
      font-size: 12px;
      padding: 8px;
      border: none;
    }
    .btn-proceed:hover { color: var(--sub); }

    .btn-trust {
      background: rgba(62,207,142,0.1);
      color: var(--safe);
      border: 1px solid rgba(62,207,142,0.25);
    }
    .btn-trust:hover { opacity: 0.88; }

    /* Branding footer */
    .card-foot {
      padding: 12px 32px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .foot-logo {
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }

    .foot-text {
      font-size: 11px;
      color: var(--sub);
    }

    .foot-text strong { color: var(--dim); }
  </style>
</head>
<body>
  <div class="card" id="mainCard">
    <div class="stripe" id="topStripe"></div>

    <div class="card-header">
      <div class="icon-wrap" id="iconWrap">
        <svg id="mainIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e05252" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>

      <div class="category-tag" id="categoryTag">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
        <span id="categoryLabel">Situs Berbahaya</span>
      </div>

      <div class="card-title" id="cardTitle">Akses Diblokir</div>
      <div class="card-desc" id="cardDesc">
        PagarNet mendeteksi situs ini sebagai ancaman dan memblokir aksesnya untuk melindungi kamu.
      </div>
    </div>

    <div class="card-info">
      <div class="info-row">
        <div class="info-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7070a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="info-content">
          <div class="info-label">URL</div>
          <div class="info-val" id="infoUrl">-</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7070a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="info-content">
          <div class="info-label">Alasan Pemblokiran</div>
          <div class="info-val plain" id="infoReason">Terdeteksi sebagai ancaman</div>
        </div>
      </div>
    </div>

    <div class="score-section">
      <div style="height:16px"></div>
      <div class="score-header">
        <span class="score-title">Skor Risiko</span>
        <span class="score-val" id="scoreVal">-<span style="font-size:13px;font-weight:500;color:var(--sub)">/100</span></span>
      </div>
      <div class="track">
        <div class="track-fill" id="trackFill"></div>
      </div>
    </div>

    <div class="card-actions">
      <button class="btn btn-back" onclick="history.back()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Kembali ke Halaman Sebelumnya
      </button>
      <button class="btn btn-report" id="reportBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
          <line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
        Laporkan ke Kominfo
      </button>
      <button class="btn btn-trust" id="trustBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
        Ini Aman (Whitelist Domain)
      </button>
      <button class="btn btn-proceed" id="proceedBtn">
        Abaikan peringatan dan tetap lanjutkan (tidak disarankan)
      </button>
    </div>

    <div class="card-foot">
      <div class="foot-logo">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="foot-text">Dilindungi oleh <strong>PagarNet</strong> - Anti Judol &amp; Scam Indonesia</span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const url      = decodeURIComponent(params.get("url") || "");
    const score    = parseInt(params.get("score") || "70");
    const category = params.get("category") || "scam";
    const reason   = decodeURIComponent(params.get("reason") || "Terdeteksi sebagai ancaman");

    document.getElementById("infoUrl").textContent   = url.length > 55 ? url.slice(0, 55) + "..." : url || "-";
    document.getElementById("infoReason").textContent = reason;
    document.getElementById("scoreVal").innerHTML     = `${score}<span style="font-size:13px;font-weight:500;color:var(--sub)">/100</span>`;

    setTimeout(() => {
      document.getElementById("trackFill").style.width = score + "%";
    }, 200);

    if (category === "judol") {
      document.getElementById("topStripe").classList.add("judol");
      document.getElementById("iconWrap").classList.add("judol");
      document.getElementById("categoryTag").classList.add("judol");
      document.getElementById("trackFill").classList.add("judol");
      document.getElementById("scoreVal").classList.add("judol");
      document.getElementById("categoryLabel").textContent = "Judi Online";
      document.getElementById("cardTitle").textContent     = "Situs Judol Diblokir";
      document.getElementById("cardDesc").textContent      = "Situs ini terindikasi sebagai platform judi online ilegal. PagarNet memblokir aksesnya untuk melindungi kamu.";
      document.getElementById("mainIcon").setAttribute("stroke", "#8b5cf6");
    } else {
      document.getElementById("categoryLabel").textContent = "Scam / Penipuan";
      document.getElementById("cardTitle").textContent     = "Situs Scam Diblokir";
      document.getElementById("cardDesc").textContent      = "Situs ini terindikasi sebagai penipuan atau phishing. Data pribadi dan uangmu bisa dicuri jika melanjutkan.";
    }

    document.getElementById("reportBtn").addEventListener("click", () => {
      chrome.runtime.sendMessage({ type: "REPORT_SITE", url, reason: category }, () => {
        const btn = document.getElementById("reportBtn");
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Laporan Terkirim`;
        btn.disabled = true;
        btn.style.opacity = "0.5";
      });
    });

    document.getElementById("trustBtn").addEventListener("click", () => {
      if (!url) return;
      if (!confirm("Whitelist domain ini? Gunakan hanya jika kamu yakin situs ini aman.")) return;

      chrome.runtime.sendMessage({ type: "TRUST_DOMAIN", url }, (res) => {
        if (!res?.success) return;
        const btn = document.getElementById("trustBtn");
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Domain Dipercaya`;
        btn.disabled = true;
        btn.style.opacity = "0.65";
        setTimeout(() => {
          location.href = url;
        }, 400);
      });
    });

    document.getElementById("proceedBtn").addEventListener("click", () => {
      if (confirm("Kamu yakin ingin melanjutkan? Situs ini mungkin berbahaya.")) {
        location.href = url;
      }
    });
  </script>
</body>
</html>
