<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PagarNet</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* Premium UI CSS - Bersih dan Jelas */
    :root {
      --bg:       #0e0e11;
      --surface:  #18181c;
      --line:     #2b2b36;
      --accent:   #4f6ef7;
      --text:     #f0f0f5;
      --sub:      #8f8f9d;
      --danger:   #ff5a5a;
      --safe:     #34d399;
      --warn:     #fbbf24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
    body { width: 340px; background: var(--bg); color: var(--text); user-select: none; }
    
    .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--line); background: var(--surface); }
    .logo { width: 34px; height: 34px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .title { flex: 1; }
    .title h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .title p { font-size: 11px; color: var(--sub); margin-top: 2px; }
    
    .hero { padding: 24px 20px; text-align: center; border-bottom: 1px solid var(--line); }
    .domain { font-size: 13px; color: var(--sub); margin-bottom: 14px; font-weight: 500; font-family: monospace; }
    .score-wrap { display: flex; align-items: baseline; justify-content: center; gap: 4px; margin-bottom: 10px; }
    .score { font-size: 52px; font-weight: 700; color: var(--safe); line-height: 1; letter-spacing: -2px;}
    .max { font-size: 14px; color: var(--sub); font-weight: 600; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 600; margin-top: 6px; }
    .status-badge svg { width: 14px; height: 14px; }
    
    .safe { color: var(--safe); }
    .danger { color: var(--danger); }
    .warn { color: var(--warn); }
    
    .bg-safe { background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.2); }
    .bg-danger { background: rgba(255, 90, 90, 0.1); border: 1px solid rgba(255, 90, 90, 0.2); }
    .bg-warn { background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); }
    
    .menu { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    
    .btn-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-card:hover { border-color: #555; background: #202025; }
    .btn-card:active { transform: scale(0.98); }
    
    .icon-box {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .icon-box svg { stroke: var(--sub); }
    
    .btn-card.primary .icon-box { background: var(--accent); }
    .btn-card.primary .icon-box svg { stroke: #fff; }
    
    .btn-card.danger { border-color: rgba(255, 90, 90, 0.2); }
    .btn-card.danger .icon-box { background: rgba(255, 90, 90, 0.15); }
    .btn-card.danger .icon-box svg { stroke: var(--danger); }
    
    .btn-text { flex: 1; text-align: left; }
    .btn-text strong { display: block; font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 3px; letter-spacing: -0.3px;}
    .btn-text span { display: block; font-size: 11px; color: var(--sub); line-height: 1.4;}
    
    .notif {
      display: none; padding: 12px; margin: 0 20px 16px; 
      border-radius: 8px; font-size: 12px; text-align: center;
      background: rgba(79, 110, 247, 0.1); color: #819dff; font-weight: 600;
      border: 1px solid rgba(79, 110, 247, 0.2);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <div class="title">
      <h1>PagarNet</h1>
      <p>Anti Judol & Scam Indonesia</p>
    </div>
  </div>

  <div class="hero">
    <div class="domain" id="currentDomain">Memuat...</div>
    <div class="score-wrap">
      <div class="score" id="scoreNumber">-</div>
      <div class="max">/100</div>
    </div>
    <div class="status-badge bg-safe safe" id="statusBadge">
      <span id="statusIcon"></span>
      <span id="statusLabel">Memeriksa...</span>
    </div>
  </div>
  
  <div class="notif" id="notifBox"></div>

  <div class="menu">
    <button class="btn-card primary" id="sweepBtn">
      <div class="icon-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M6 12h12"/><path d="M9 18h6"/></svg>
      </div>
      <div class="btn-text">
        <strong>Sapu Bersih Iklan (Sweep)</strong>
        <span>Hapus paksa iklan judol yang nyangkut di halaman ini</span>
      </div>
    </button>
    
    <button class="btn-card" id="reportBtn">
      <div class="icon-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      </div>
      <div class="btn-text">
        <strong>Laporkan Situs</strong>
        <span>Laporkan web atau link ini ke satgas keamanan</span>
      </div>
    </button>
    
    <button class="btn-card danger" id="panicBtn">
      <div class="icon-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div class="btn-text">
        <strong>Tutup Semua Tab Berbahaya</strong>
        <span>Panik? Tutup otomatis seluruh tab browser judol/scam</span>
      </div>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
